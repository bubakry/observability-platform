name: ci

on:
  pull_request:
  push:
    branches:
      - "**"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.8

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive

      - name: Initialize Terraform
        run: terraform init -backend=false

      - name: Validate Terraform
        run: terraform validate

      - name: Validate Python sources
        run: python3 -m compileall app

      - name: Validate shell scripts
        run: |
          bash -n grafana/entrypoint.sh
          bash -n scripts/bootstrap-config.sh
          bash -n scripts/deploy.sh
          bash -n scripts/destroy.sh

      - name: Install PyYAML for provisioning validation
        run: python3 -m pip install --quiet pyyaml

      - name: Validate Grafana provisioning
        run: |
          python3 -c "import yaml; yaml.safe_load(open('grafana/provisioning/datasources/datasources.yaml'))"
          python3 -c "import yaml; yaml.safe_load(open('grafana/provisioning/dashboards/dashboards.yaml'))"
          find grafana/dashboards.tmpl -name '*.json' -print0 | xargs -0 -n 1 jq empty
