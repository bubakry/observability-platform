apiVersion: 1

datasources:
  - name: CloudWatch
    type: cloudwatch
    uid: cloudwatch-observability
    access: proxy
    isDefault: true
    editable: true
    jsonData:
      authType: default
      defaultRegion: ${AWS_REGION}
      defaultLogGroups:
        - ${APP_LOG_GROUP}

  - name: X-Ray
    type: grafana-x-ray-datasource
    uid: xray-observability
    access: proxy
    editable: true
    jsonData:
      authType: default
      defaultRegion: ${AWS_REGION}
