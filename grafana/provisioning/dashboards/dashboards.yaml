apiVersion: 1

providers:
  - name: observability
    orgId: 1
    folder: AWS Enterprise Observability Platform
    folderUid: enterprise-observability
    type: file
    disableDeletion: false
    editable: true
    allowUiUpdates: true
    updateIntervalSeconds: 30
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
