[SERVICE]
    Flush         1
    Grace         30
    Log_Level     info
    Parsers_File  /fluent-bit/etc/parsers.conf

[INPUT]
    Name          forward
    Listen        0.0.0.0
    Port          24224

[FILTER]
    Name          parser
    Match         *
    Key_Name      log
    Parser        json
    Reserve_Data  On
    Preserve_Key  Off

[FILTER]
    Name          modify
    Match         *
    Add           observability_platform aws-enterprise-observability

[OUTPUT]
    Name                  es
    Match                 *
    Host                  ${OPENSEARCH_HOST}
    Port                  443
    Index                 ${OPENSEARCH_INDEX}
    AWS_Auth              On
    AWS_Region            ${AWS_REGION}
    Generate_ID           On
    Replace_Dots          On
    Suppress_Type_Name    On
    tls                   On
    Retry_Limit           3

[OUTPUT]
    Name                  cloudwatch_logs
    Match                 *
    region                ${AWS_REGION}
    log_group_name        ${APPLICATION_LOG_GROUP}
    log_stream_prefix     ecs-
    auto_create_group     false
    Retry_Limit           3

